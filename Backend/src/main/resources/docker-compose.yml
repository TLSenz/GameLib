networks:
  mongo-cluster:
    driver: bridge

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:

services:
  mongo1:
    image: mongo:7.0
    container_name: mongo_primary
    hostname: mongo1
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--port"
      - "27017"
      - "--keyFile"
      - "/etc/mongodb/keyfile"
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db
      - ./scripts/keyfile:/etc/mongodb/keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    networks:
      - mongo-cluster
    # Healthcheck initialisiert das Replica Set automatisch
    healthcheck:
      test: >
        echo "try { rs.status() } catch(err) {
          rs.initiate({
            _id: 'rs0',
            members: [
              { _id: 0, host: 'mongo1:27017', priority: 2 },
              { _id: 1, host: 'mongo2:27018', priority: 1 },
              { _id: 2, host: 'mongo3:27019', priority: 1 }
            ]
          })
        }" | mongosh --port 27017
        -u admin -p adminpassword
        --authenticationDatabase admin --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongo2:
    image: mongo:7.0
    container_name: mongo_secondary1
    hostname: mongo2
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--port"
      - "27018"
      - "--keyFile"
      - "/etc/mongodb/keyfile"
    ports:
      - "27018:27018"
    volumes:
      - mongo2-data:/data/db
      - ./scripts/keyfile:/etc/mongodb/keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    networks:
      - mongo-cluster

  mongo3:
    image: mongo:7.0
    container_name: mongo_secondary2
    hostname: mongo3
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--port"
      - "27019"
      - "--keyFile"
      - "/etc/mongodb/keyfile"
    ports:
      - "27019:27019"
    volumes:
      - mongo3-data:/data/db
      - ./scripts/keyfile:/etc/mongodb/keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    networks:
      - mongo-cluster